[General]
# Do not blacklist wifi interfaces — allow connman to manage wlan0
NetworkInterfaceBlacklist = usb0,usb1,usb2,usb3

# Prefer ethernet then wifi; enable both
PreferredTechnologies = ethernet,wifi

# Stay online (don't go offline just because wifi has no carrier yet)
AlwaysConnectedTechnologies = ethernet

# Allow connman to power up wifi automatically
SingleConnectedTechnology = false
